name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify package tarballs
        run: |
          pnpm clean
          expected_version="$(node -p "require('./package.json').version")"

          pack_dir="$(mktemp -d)"
          pnpm --filter @openrender/core pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-phaser pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-godot pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-love2d pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-pixi pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-canvas pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-unity pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/reporter pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/doctor pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/harness-visual pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/mcp-server pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/cli pack --pack-destination "$pack_dir"

          for tgz in "$pack_dir"/*.tgz; do
            if tar -tzf "$tgz" | grep -E '(^|/)(\.openrender|\.env|\.DS_Store)|test\.|tsbuildinfo'; then
              echo "Unexpected files found in $tgz"
              exit 1
            fi
          done

          mkdir -p "$pack_dir/install"
          cd "$pack_dir/install"
          npm init -y
          npm install \
            "$pack_dir"/openrender-core-*.tgz \
            "$pack_dir"/openrender-adapter-phaser-*.tgz \
            "$pack_dir"/openrender-adapter-godot-*.tgz \
            "$pack_dir"/openrender-adapter-love2d-*.tgz \
            "$pack_dir"/openrender-adapter-pixi-*.tgz \
            "$pack_dir"/openrender-adapter-canvas-*.tgz \
            "$pack_dir"/openrender-adapter-unity-*.tgz \
            "$pack_dir"/openrender-reporter-*.tgz \
            "$pack_dir"/openrender-doctor-*.tgz \
            "$pack_dir"/openrender-harness-visual-*.tgz \
            "$pack_dir"/openrender-mcp-server-*.tgz \
            "$pack_dir"/openrender-cli-*.tgz
          test "$(./node_modules/.bin/openrender --version)" = "$expected_version"
