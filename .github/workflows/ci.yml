name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Verify package tarballs
        run: |
          pack_dir="$(mktemp -d)"
          pnpm --filter @openrender/core pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-phaser pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/adapter-godot pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/reporter pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/doctor pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/harness-visual pack --pack-destination "$pack_dir"
          pnpm --filter @openrender/cli pack --pack-destination "$pack_dir"

          for tgz in "$pack_dir"/*.tgz; do
            if tar -tzf "$tgz" | grep -E '(^|/)(\.openrender|\.env|\.DS_Store)|test\.|tsbuildinfo'; then
              echo "Unexpected files found in $tgz"
              exit 1
            fi
          done

          mkdir -p "$pack_dir/install"
          cd "$pack_dir/install"
          npm init -y
          npm install \
            "$pack_dir"/openrender-core-0.2.0.tgz \
            "$pack_dir"/openrender-adapter-phaser-0.2.0.tgz \
            "$pack_dir"/openrender-adapter-godot-0.2.0.tgz \
            "$pack_dir"/openrender-reporter-0.2.0.tgz \
            "$pack_dir"/openrender-doctor-0.2.0.tgz \
            "$pack_dir"/openrender-harness-visual-0.2.0.tgz \
            "$pack_dir"/openrender-cli-0.2.0.tgz
          ./node_modules/.bin/openrender --version | grep '^0\.2\.0$'
