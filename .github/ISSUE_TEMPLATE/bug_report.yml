name: Bug report
description: Report a reproducible openRender problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands
      description: Paste the openRender command sequence with private paths removed.
      render: bash
    validations:
      required: true
